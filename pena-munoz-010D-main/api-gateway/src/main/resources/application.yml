server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: catalogo-service
          uri: http://localhost:8081
          predicates:
            - Path=/catalogo/**

        - id: ventas-service
          uri: http://localhost:8084
          predicates:
            - Path=/ventas/**

        - id: clientes-service
          uri: http://localhost:8088
          predicates:
            - Path=/clientes/**

        - id: abastecimiento-service
          uri: http://localhost:8083
          predicates:
            - Path=/abastecimiento/**

        - id: promociones-service
          uri: http://localhost:8085
          predicates:
            - Path=/promociones/**

        - id: envios-service
          uri: http://localhost:8086
          predicates:
            - Path=/envios/**

        - id: fidelizacion-service
          uri: http://localhost:8087
          predicates:
            - Path=/fidelizacion/**

        - id: postventa-service
          uri: http://localhost:8090
          predicates:
            - Path=/postventa/**

        - id: resenas-service
          uri: http://localhost:8089
          predicates:
            - Path=/resenas/**

        - id: combos-service
          uri: http://localhost:8082
          predicates:
            - Path=/combos/**