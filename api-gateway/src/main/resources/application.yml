server:
  port: 9090

jwt:
  secret: "493358340235739058340598340598340598340598340598"

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # --- CONFIGURACIÓN DE CORS GLOBAL (Según el Word) ---
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:9090"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:
        # ---- RUTAS LIBRES (sin filtro JWT) ----
        # Auth
        - id: auth-service
          uri: http://localhost:8091
          predicates:
            - Path=/auth/**

        # Documentación de los microservicios (Rutas JSON)
        - id: combos-docs
          uri: http://localhost:8082
          predicates:
            - Path=/api/combos/v3/api-docs

        - id: envios-docs
          uri: http://localhost:8086
          predicates:
            - Path=/envios/v3/api-docs

        - id: fidelizacion-docs
          uri: http://localhost:8087
          predicates:
            - Path=/fidelizacion/v3/api-docs

        # ---- RUTAS PROTEGIDAS (con filtro JWT) ----
        - id: catalogo-service
          uri: http://localhost:8081
          predicates:
            - Path=/catalogo/**
          filters:
            - AuthenticationFilter

        - id: combos-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/combos/**
          filters:
            - AuthenticationFilter

        - id: abastecimiento-service
          uri: http://localhost:8083
          predicates:
            - Path=/abastecimiento/**
          filters:
            - AuthenticationFilter

        - id: ventas-service
          uri: http://localhost:8084
          predicates:
            - Path=/ventas/**
          filters:
            - AuthenticationFilter

        - id: promociones-service
          uri: http://localhost:8085
          predicates:
            - Path=/promociones/**
          filters:
            - AuthenticationFilter

        - id: envios-service
          uri: http://localhost:8086
          predicates:
            - Path=/envios/**
          filters:
            - AuthenticationFilter

        - id: fidelizacion-service
          uri: http://localhost:8087
          predicates:
            - Path=/fidelizacion/**
          filters:
            - AuthenticationFilter

        - id: clientes-service
          uri: http://localhost:8088
          predicates:
            - Path=/clientes/**
          filters:
            - AuthenticationFilter

        - id: resenas-service
          uri: http://localhost:8089
          predicates:
            - Path=/resenas/**
          filters:
            - AuthenticationFilter

        - id: postventa-service
          uri: http://localhost:8090
          predicates:
            - Path=/postventa/**
          filters:
            - AuthenticationFilter

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false

# --- SWAGGER UI CENTRALIZADO ---
springdoc:
  swagger-ui:
    urls:
      - name: Servicio Autenticación 
        url: /auth/v3/api-docs       
      - name: Servicio Combos
        url: /api/combos/v3/api-docs
      - name: Servicio Envíos
        url: /envios/v3/api-docs
      - name: Servicio Fidelización
        url: /fidelizacion/v3/api-docs