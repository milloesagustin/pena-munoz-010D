spring.application.name=service-fidelizacion
server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/db_fidelizacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# --- Configuración Swagger y API Docs ---
springdoc.swagger-ui.path=/swagger-ui/index.html
server.forward-headers-strategy=framework
springdoc.swagger-ui.operations-sorter=alpha
# --- Configuración CORS ---
spring.mvc.cors.allowed-origins=http://localhost:9090
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*

# Ruta donde se generará el JSON de la documentación
springdoc.api-docs.path=/fidelizacion/v3/api-docs

# Obligar a probar mediante el Gateway
springdoc.server-url=http://localhost:9090