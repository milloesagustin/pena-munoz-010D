spring.application.name=service-fidelizacion
server.port=8087

spring.datasource.url=jdbc:mysql://localhost:3306/db_fidelizacion?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# --- Configuración Swagger y API Docs ---
springdoc.api-docs.path=/api/fidelizacion/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.server-url=http://localhost:9090

# --- Configuración CORS ---
spring.mvc.cors.allowed-origins=http://localhost:9090
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*